name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.9.3"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build documentation
        run: make docs

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          pull: true
          tags: reproducible-research-project:ci
          cache-from: type=gha,scope=reproducible-research-project
          cache-to: type=gha,mode=max,scope=reproducible-research-project

      - name: Reproduce project
        run: docker run --rm reproducible-research-project:ci
