name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.9.3"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install Quarto
        run: |
          curl -fsSL -o quarto.deb \
            "https://github.com/quarto-dev/quarto-cli/releases/download/v1.9.37/quarto-1.9.37-linux-amd64.deb"
          sudo apt-get update
          sudo apt-get install -y ./quarto.deb
          rm -f quarto.deb

      - name: Install R and rugarch
        run: |
          sudo apt-get install -y --no-install-recommends \
            r-base r-base-dev \
            cmake \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev
          sudo R -e "
            options(repos=c(CRAN='https://cloud.r-project.org'));
            install.packages(c('fs', 'nloptr'), dependencies=TRUE);
            install.packages('rugarch', dependencies=TRUE);
            if (!requireNamespace('rugarch', quietly=TRUE)) stop('rugarch install failed')
          "

      - name: Install dependencies
        run: uv sync --frozen --group r-bridge

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build documentation
        run: make docs

      - name: Render report
        run: make report

  docker:
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build --pull -t reproducible-research-project:ci .