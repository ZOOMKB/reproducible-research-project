name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.9.3"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install Quarto
        run: |
          curl -fsSL -o quarto.deb \
            "https://github.com/quarto-dev/quarto-cli/releases/download/v1.9.37/quarto-1.9.37-linux-amd64.deb"
          sudo apt-get update
          sudo apt-get install -y ./quarto.deb
          rm -f quarto.deb

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build documentation
        run: make docs

      - name: Render report
        run: make report

  docker:
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build --pull -t reproducible-research-project:ci .
